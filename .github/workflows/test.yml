name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov aiohttp ruff

      - name: Compile check
        run: |
          python -m py_compile custom_components/gmc500/__init__.py
          python -m py_compile custom_components/gmc500/coordinator.py
          python -m py_compile custom_components/gmc500/sensor.py
          python -m py_compile custom_components/gmc500/config_flow.py
          python -m py_compile custom_components/gmc500/server.py
          python -m py_compile custom_components/gmc500/const.py
          python -m py_compile custom_components/gmc500/diagnostics.py

      - name: Lint with ruff
        run: ruff check custom_components/ tests/

      - name: Run tests with coverage
        run: pytest --cov=custom_components.gmc500 --cov-report=term-missing --cov-fail-under=80 -v

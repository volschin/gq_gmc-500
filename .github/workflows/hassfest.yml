name: Hassfest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Hassfest Validation
        uses: home-assistant/actions/hassfest@master
